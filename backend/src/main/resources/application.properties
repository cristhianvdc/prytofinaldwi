spring.application.name=athletix-sports-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/athletix_sports?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:thian1031992}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=8MB

app.jwt.secret=${JWT_SECRET:AthletixSportsSuperSecretKeyForDevelopmentOnly123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.upload-dir=${UPLOAD_DIR:uploads}
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:4200}
