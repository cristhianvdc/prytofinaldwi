<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/baseTemplate :: head(~{::title})">
    <title>Formulario Producto</title>
</head>
<body>

<div th:replace="layout/baseTemplate :: navbar"></div>

<div class="container my-5">

    <div class="card shadow">
        <div class="card-body">

            <h4 th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}"></h4>
            <hr>

            <div th:replace="layout/mensaje :: msg"></div>

            <form th:action="@{/productos/guardar}"
                  th:object="${producto}"
                  method="post">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nombre:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Precio:</label>
                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Imagen URL:</label>
                        <input type="text" th:field="*{imagenUrl}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Categoría:</label>
                        <select class="form-select" th:field="*{categoria.id}" required>
                            <option value="">::: Seleccione :::</option>
                            <option th:each="item : ${categorias}"
                                    th:value="${item.id}"
                                    th:text="${item.nombre}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label>Descripción:</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" th:field="*{destacado}">
                            <label class="form-check-label">Producto destacado</label>
                        </div>
                    </div>
                </div>

                <input type="hidden" th:field="*{id}">

                <div class="mt-3">
                    <button class="btn btn-primary btn-sm">
                        <i class="fa fa-save"></i> Guardar
                    </button>

                    <a th:href="@{/productos}" class="btn btn-dark btn-sm">
                        <i class="fa fa-arrow-left"></i> Volver
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

<div th:replace="layout/baseTemplate :: footer"></div>
<div th:replace="layout/baseTemplate :: js"></div>

</body>
</html>
