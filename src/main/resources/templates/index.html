<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="layout/baseTemplate :: head(~{::title})">
        <title>Athletix Sport Store</title>
    </head>
    <body>
        <div th:replace="layout/baseTemplate :: navbar"></div>

        <!-- CARRUSEL -->
        <div id="carouselEjemplo" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/puma banner.webp" class="d-block w-100" alt="Zapatillas Nike">
                </div>
                <div class="carousel-item">
                    <img src="img/adidas banner.avif" class="d-block w-100" alt="Nueva Colección">
                </div>
                <div class="carousel-item">
                    <img src="img/banner4.jpg" class="d-block w-100" alt="Encuentra tu estilo">
                </div>
                <div class="carousel-item">
                    <img src="img/reebok banner.webp" class="d-block w-100" alt="Encuentra tu estilo">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselEjemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselEjemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <section class="container my-5">
            <h2 class="text-center mb-5">Productos Destacados</h2>
            <div class="row">
                <div class="col-md-3" th:each="producto : ${productos}">
                    <div class="card">
                        <img th:src="@{${producto.imagenUrl}}" 
                             onerror="this.onerror=null; this.src='/img/img_not_found.jpg';"
                             class="card-img-top" th:alt="${producto.nombre}">
                        <div class="card-body text-center">
                            <h5 class="card-title" th:text="${producto.nombre}"></h5>
                            <p class="card-text">S/ <span th:text="${producto.precio}"></span></p>
                            <a href="#" class="btn btn-dark"
                               data-bs-toggle="modal"
                               data-bs-target="#productModal"
                               th:attr="data-nombre=${producto.nombre},
                               data-id=${producto.id},
                               data-categoria=${producto.categoria.id},
                               data-descripcion=${producto.descripcion},
                               data-precio=${producto.precio},
                               data-imagen=@{${producto.imagenUrl}}">
                                Comprar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="modal fade" id="productModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <!-- El contenido se insertará aquí dinámicamente -->
                </div>
            </div>
        </div>

        <div th:replace="layout/baseTemplate :: footer"></div>
        <div th:replace="layout/baseTemplate :: js"></div>
    </body>
</html>
