<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="layout/baseTemplate :: head(~{::title})">
        <title>Registro de Cliente - Athletix Sport</title>
    </head>
    <body>
        <div th:replace="layout/baseTemplate :: navbar"></div>

        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="card shadow-lg border-0 w-100" style="max-width: 450px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-3">Registro de Cliente</h3>
                    <hr />

                    <div th:if="${success}" class="alert alert-success text-center py-2" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}"></div>

                    <form th:action="@{/registro}" th:object="${cliente}" method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label for="nombres" class="form-label fw-semibold">Nombres</label>
                            <input type="text" th:field="*{nombres}" class="form-control" id="nombres" placeholder="Ingrese sus nombres">
                            <div th:if="${#fields.hasErrors('nombres')}" class="text-danger small mt-1" th:errors="*{nombres}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="apellidos" class="form-label fw-semibold">Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" placeholder="Ingrese sus apellidos">
                            <div th:if="${#fields.hasErrors('apellidos')}" class="text-danger small mt-1" th:errors="*{apellidos}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="telefono" class="form-label fw-semibold">Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control" id="telefono" placeholder="Ejemplo: 987654321">
                            <div th:if="${#fields.hasErrors('telefono')}" class="text-danger small mt-1" th:errors="*{telefono}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" th:field="*{correo}" class="form-control" id="correo" placeholder="ejemplo@correo.com">
                            <div th:if="${#fields.hasErrors('correo')}" class="text-danger small mt-1" th:errors="*{correo}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Mínimo 6 caracteres">
                            <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fa fa-check-circle me-2"></i>Registrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="layout/baseTemplate :: footer"></div>
        <div th:replace="layout/baseTemplate :: js"></div>
    </body>
</html>
