<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="layout/baseTemplate :: head(~{::title})">
        <title>Athletix Sport Store</title>
    </head>
    <body>
        <div th:replace="layout/baseTemplate :: navbar"></div>

        <div class="container mt-4">
            <h3 class="mb-4 text-center">🛒 Carrito de Compras</h3>
            <hr />
            <div th:if="${#lists.isEmpty(carrito)}" class="alert alert-warning text-center">
                Carrito vacío.
            </div>

            <div th:if="${!#lists.isEmpty(carrito)}">
                <table class="table table-hover align-middle">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>Imagen</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Talla</th>
                            <th>Color</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item, iterStat : ${carrito}">
                            <td><img th:src="${item.imagenUrl}" onerror="this.src='/img/img_not_found.jpg';" style="width: 60px;"></td>
                            <td th:text="${item.nombre}"></td>
                            <td th:text="${item.nombreCategoria}"></td>
                            <td th:text="${item.talla}"></td>
                            <td th:text="${item.color}"></td>
                            <td>S/ <span th:text="${item.precio}"></span></td>
                            <td>
                                <form th:action="@{/carrito/actualizar}" method="post" class="d-flex justify-content-center">
                                    <input type="hidden" name="productoId" th:value="${item.idProducto}">
                                    <input type="hidden" name="talla" th:value="${item.talla}">
                                    <input type="hidden" name="color" th:value="${item.color}">
                                    <input type="number" name="cantidad" th:value="${item.cantidad}" min="1" class="form-control form-control-sm w-50">
                                    <button class="btn btn-sm btn-primary ms-2" title="Actualizar"><i class="fa fa-refresh"></i></button>
                                </form>
                            </td>
                            <td>S/ <span th:text="${item.subtotal}"></span></td>
                            <td>
                                <a th:href="@{/carrito/eliminar/{index}(index=${iterStat.index})}" 
                                   class="btn btn-sm btn-danger" title="Eliminar">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-end mt-3">
                    <h4>Total: S/ <span th:text="${total}"></span></h4>
                    <a href="/carrito/procesar" class="btn btn-dark mt-2">Procesar Compra</a>
                </div>
            </div>
        </div>

        <div th:replace="layout/baseTemplate :: footer"></div>
        <div th:replace="layout/baseTemplate :: js"></div>
    </body>
</html>
