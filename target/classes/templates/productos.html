<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <head th:replace="layout/baseTemplate :: head(~{::title})">
        <title>Tienda - Athletix Sport Store</title>
    </head>
    <body>
        <div th:replace="layout/baseTemplate :: navbar"></div>

        <section class="container my-5">
            <h2 class="text-center mb-5" th:text="${titulo}"></h2>
            <hr />

            <div class="row" th:if="${productos != null and !productos.isEmpty()}">
                <div class="col-md-3 mb-4" th:each="producto : ${productos}">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{${producto.imagenUrl}}" 
                             onerror="this.onerror=null; this.src='/img/img_not_found.jpg';"
                             class="card-img-top" th:alt="${producto.nombre}">
                        <div class="card-body text-center">
                            <h5 class="card-title" th:text="${producto.nombre}"></h5>
                            <p class="card-text">S/ <span th:text="${producto.precio}"></span></p>
                            <a href="#" class="btn btn-dark"
                               data-bs-toggle="modal"
                               data-bs-target="#productModal"
                               th:attr="data-nombre=${producto.nombre},
                               data-id=${producto.id},
                               data-categoria=${producto.categoria.id},
                               data-descripcion=${producto.descripcion},
                               data-precio=${producto.precio},
                               data-imagen=@{${producto.imagenUrl}}">
                                Comprar
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center my-5" th:if="${productos == null or productos.isEmpty()}">
                <h4 class="text-muted">No hay productos disponibles en este momento</h4>
                <p class="text-secondary">Vuelve más tarde para descubrir nuestras novedades.</p>
            </div>
        </section>

        <div class="modal fade" id="productModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                </div>
            </div>
        </div>

        <div th:replace="layout/baseTemplate :: footer"></div>
        <div th:replace="layout/baseTemplate :: js"></div>
    </body>
</html>
