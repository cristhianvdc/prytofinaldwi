<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head  th:fragment="head(title)">
        <meta charset="UTF-8">
        <title th:replace="${title}"></title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"  rel="stylesheet" />
        <link rel="stylesheet" href="styles/stylesIndex.css" type="text/css" />
        <link rel="stylesheet" href="styles/stylesContactanos.css" type="text/css" />
    </head>

    <body>    
        <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <img src="img/logoprincipal.png" alt="Logo athletix sport" width="100">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link active" href="/">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="/tienda">Tienda</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Categorías</a>
                            <ul class="dropdown-menu">
                                <li th:each="categoria : ${categorias}">
                                    <a class="dropdown-item" 
                                       th:text="${categoria.nombre}" 
                                       th:href="@{'/categoria?id=' + ${categoria.id}}"></a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="/tienda">Ver todos los productos</a></li>
                            </ul>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="/sobreNosotros">Sobre Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link" href="/contactanos">Contáctanos</a></li>
						<li class="nav-item"><a class="nav-link" href="/productos">Gest. Productos</a></li>
                    </ul>
                    <div class="d-flex align-items-center">
                        <form action="/buscar" class="d-flex me-3">
                            <input class="form-control me-2" name="q" type="search" placeholder="Busca productos..."
                                   th:value="${q}">
                            <button class="btn btn-danger" type="submit">Buscar</button>
                        </form>

                        <a href="/carrito" class="btn btn-outline-dark ms-2">
                            Carrito (<span th:text="${cantidadCarrito != null ? cantidadCarrito : 0}" id="linkCarrito">0</span>)
                        </a>
                        <a href="/registro" class="btn btn-outline-primary ms-3">
                            <i class="fa fa-user-plus"></i> Registrarse
                        </a>
                    </div>
                </div>
            </div>
        </nav>
		
        <footer th:fragment="footer" class="text-white text-center py-4 mt-5">
            <p>&copy; 2025 ATHLETIX SPORT. Todos los derechos reservados.</p>
        </footer>

        <div th:fragment="js">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <script src="js/modal.js"></script>
        </div>
    </body>
</html>
